<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Giriş / Kayıt ekranı (çıkış yapılmışken görünür) -->
  <div class="app" id="auth-view" hidden>
    <h1>📝 Yapılacaklar</h1>
    <p class="subtitle">Devam etmek için giriş yap veya kaydol</p>

    <form id="auth-form" class="auth-form">
      <input type="email" id="auth-email" placeholder="E-posta" autocomplete="email" required />
      <input type="password" id="auth-password" placeholder="Şifre (en az 6 karakter)" autocomplete="current-password" required />
      <div class="auth-buttons">
        <button type="submit" id="login-btn">Giriş yap</button>
        <button type="button" id="signup-btn" class="secondary">Kaydol</button>
      </div>
      <p id="auth-message" class="auth-message"></p>
    </form>
  </div>

  <!-- Uygulama (giriş yapılmışken görünür) -->
  <div class="app" id="app-view" hidden>
    <div class="topbar">
      <h1>📝 Yapılacaklar</h1>
      <div class="user-box">
        <span id="user-email" class="user-email"></span>
        <button id="logout-btn" class="clear-btn">Çıkış</button>
      </div>
    </div>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="Yeni bir görev ekle..."
        autocomplete="off"
      />
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter active" data-filter="all">Tümü</button>
      <button class="filter" data-filter="active">Aktif</button>
      <button class="filter" data-filter="done">Tamamlanan</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span id="count">0 görev</span>
      <button id="clear-done" class="clear-btn">Tamamlananları temizle</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
