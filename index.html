<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>📝 Yapılacaklar</h1>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="Yeni bir görev ekle..."
        autocomplete="off"
      />
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter active" data-filter="all">Tümü</button>
      <button class="filter" data-filter="active">Aktif</button>
      <button class="filter" data-filter="done">Tamamlanan</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span id="count">0 görev</span>
      <button id="clear-done" class="clear-btn">Tamamlananları temizle</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
